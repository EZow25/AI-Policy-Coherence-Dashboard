<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Policy Coherence</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .country-page {
      max-width: 680px;
      margin: 32px auto;
      background: #fff;
      border-radius: 8px;
      padding: 32px 40px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #004478;
      text-decoration: none;
      font-size: 10pt;
    }
    .back-link:hover { text-decoration: underline; }
    h1 { margin: 0 0 4px; }
    .overall-score {
      font-size: 48pt;
      font-weight: 700;
      color: #004478;
      line-height: 1;
    }
    .overall-label {
      font-size: 10pt;
      color: #888;
      margin-bottom: 32px;
    }
    .principle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .principle-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .principle-label { flex: 1; font-size: 10pt; }
    .bar-track {
      flex: 2;
      height: 10px;
      background: #e8e8e8;
      border-radius: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(to right, #c6dbef, #08306B);
    }
    .principle-pct {
      width: 36px;
      text-align: right;
      font-size: 10pt;
      font-weight: 600;
      color: #004478;
    }
    .not-found {
      text-align: center;
      margin-top: 80px;
      color: #888;
    }
  </style>
</head>
<header>
  <p>AI Policy Coherence: Southeast Asia</p>
</header>
<body>
  <div class="country-page">
    <a class="back-link" href="index.html">← Back to Dashboard</a>
    <div id="content">Loading…</div>
  </div>
</body>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="country.js"></script>
</html>
